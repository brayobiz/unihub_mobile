name: unihub_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+3

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.5

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.3

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2

  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.0.1
  firebase_crashlytics: ^4.0.1
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  shared_preferences: ^2.2.2
  geolocator: ^11.0.0
  cloudinary_public: ^0.23.1
  http: ^1.2.1
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.3
  dio: ^5.4.1
  google_generative_ai: ^0.4.0
  open_filex: ^4.5.0
  path: ^1.9.0
  pdfx: ^2.9.2
  cached_network_image: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  rxdart: ^0.27.7
  shimmer: ^3.0.0
  webview_flutter: ^4.8.0
  google_mobile_ads: ^5.1.0
  flutter_map: ^6.1.0
  flutter_map_marker_cluster: ^1.3.6
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/campus_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0a0e14" # Matching your logo's dark background
  adaptive_icon_foreground: "assets/icon/campus_icon.png"
  # This property helps keep the logo within the safe zone on Android
  min_sdk_android: 21

flutter_native_splash:
  color: "#0a0e14"
  image: "assets/icon/campus_icon.png"
  android_12:
    image: "assets/icon/campus_icon.png"
    color: "#0a0e14"
  fullscreen: false

# Remove win32 override - it was causing the FFI errors
# dependency_overrides:
#   win32: ^6.3.0